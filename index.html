<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monolith — Study Notes</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #e5e5e5;
            --accent-color: #888888;
            --border-color: #222222;
            --hover-color: #ffffff;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            padding: 0 20px;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-family: var(--font-mono);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1.2rem;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        .nav-links a {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 0.9rem;
            font-family: var(--font-mono);
            transition: color 0.2s ease;
        }

        .nav-links a:hover {
            color: var(--hover-color);
        }

        /* Main Container */
        main {
            max-width: 800px;
            margin: 80px auto;
        }

        /* Hero Section */
        .hero {
            margin-bottom: 60px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 400;
            letter-spacing: -1px;
            margin-bottom: 15px;
        }

        .tagline {
            font-family: var(--font-mono);
            color: var(--accent-color);
            font-style: italic;
            font-size: 1rem;
            border-left: 2px solid var(--border-color);
            padding-left: 15px;
        }

        /* Content / Dynamic Notes Grid */
        .section-title {
            font-family: var(--font-mono);
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 2px;
            color: var(--accent-color);
            margin-bottom: 20px;
        }

        .notes-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        @media (min-width: 600px) {
            .notes-grid {
                grid-template-columns: 1fr 1fr;
            }
        }

        /* Interactive Note Card Layout */
        .note-card {
            display: block;
            text-decoration: none;
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 20px;
            border-radius: 4px;
            transition: border-color 0.2s ease;
        }

        .note-card:hover {
            border-color: var(--hover-color);
        }

        .note-card h3 {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 8px;
            text-transform: capitalize; /* Clean up file name casing */
        }

        .note-card p {
            color: var(--accent-color);
            font-size: 0.9rem;
        }

        /* Footer */
        footer {
            max-width: 800px;
            margin: 100px auto 40px auto;
            text-align: center;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--accent-color);
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Monolith</div>
        <ul class="nav-links">
            <li><a href="https://ankitx007x.github.io/monolith">Home</a></li>
            <li><a href="https://ankitx007x.github.io/monolith/archives">Archives</a></li>
            <li><a href="https://ankitx007x.github.io/monolith/about">About</a></li>
        </ul>
    </nav>

    <main>
        <section class="hero">
            <h1>MONOLITH</h1>
            <p class="tagline">"Is it possible to know too much?" — Johnny, Naked (1993)</p>
        </section>

        <section class="content">
            <h2 class="section-title">Recent Entries</h2>
            
            <div class="notes-grid" id="recent-entries-container">
                <p style="color: var(--accent-color); font-family: var(--font-mono);">Scanning archives...</p>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 MONOLITH. Built to persist.</p>
    </footer>

    <script>
        const USERNAME = 'ankitx007x';
        const REPO = 'monolith';
        const PATH = 'archives'; // Folder containing your post files

        async function fetchRecentEntries() {
            const container = document.getElementById('recent-entries-container');
            
            try {
                // Call GitHub's API to scan the contents of the /archives folder
                const response = await fetch(`https://api.github.com/repos/${USERNAME}/${REPO}/contents/${PATH}`);
                
                if (!response.ok) throw new Error('API request failed');
                
                const files = await response.json();
                
                // Filter out folders and common directory files like index.html or README
                const posts = files
                    .filter(file => file.type === 'file' && file.name !== 'index.html' && file.name !== 'README.md')
                    .reverse()    // Put the newest files at the beginning
                    .slice(0, 4); // Limit front page view to the 4 newest entries

                if (posts.length === 0) {
                    container.innerHTML = '<p style="color: var(--accent-color); font-family: var(--font-mono);">No active log entries found.</p>';
                    return;
                }

                // Empty out the 'Scanning...' text placeholder
                container.innerHTML = '';

                // Build code blocks structurally for each discovered file
                posts.forEach((post, index) => {
                    // Strips extensions (.html) and changes underscores/dashes to spaces for a clean title
                    let displayTitle = post.name
                        .replace(/\.[^/.]+$/, "") 
                        .replace(/[-_]/g, " ");   
                    
                    const card = document.createElement('a');
                    card.href = `https://${USERNAME}.github.io/${REPO}/${PATH}/${post.name}`;
                    card.className = 'note-card';
                    
                    // Creates numbering sequence padding single digits with leading zeros (e.g. [01])
                    const entryNumber = String(index + 1).padStart(2, '0');
                    
                    card.innerHTML = `
                        <h3>[${entryNumber}] ${displayTitle}</h3>
                        <p>View structural logs and archival documentation for this entry.</p>
                    `;
                    
                    container.appendChild(card);
                });

            } catch (error) {
                console.error('Error auto-generating blog feed:', error);
                container.innerHTML = '<p style="color: var(--accent-color); font-family: var(--font-mono);">Failed to sync with structural data tree.</p>';
            }
        }

        document.addEventListener('DOMContentLoaded', fetchRecentEntries);
    </script>

</body>
</html>
