<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monolith — Study Notes</title>
    <style>
        :root {
            --bg-color: #0a0a0a;
            --text-color: #e5e5e5;
            --accent-color: #888888;
            --border-color: #222222;
            --hover-color: #ffffff;
            --font-mono: 'Courier New', Courier, monospace;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            padding: 0 20px;
        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 0;
            border-bottom: 1px solid var(--border-color);
        }

        .logo {
            font-family: var(--font-mono);
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1.2rem;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            list-style: none;
        }

        .nav-links a {
            color: var(--accent-color);
            text-decoration: none;
            font-size: 0.9rem;
            font-family: var(--font-mono);
            transition: color 0.2s ease;
        }

        .nav-links a:hover {
            color: var(--hover-color);
        }

        /* Main Container */
        main {
            max-width: 800px;
            margin: 120px auto;
        }

        /* Hero / Combined Header Section */
        .hero-banner {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 20px;
            margin-bottom: 60px;
        }

        @media (min-width: 650px) {
            .hero-banner {
                flex-direction: row;
                gap: 30px;
            }
        }

        h1.main-title {
            font-size: 3.5rem;
            font-weight: 400;
            letter-spacing: -1px;
            line-height: 1;
        }

        .dirty-job-quote {
            font-family: var(--font-mono);
            color: var(--accent-color);
            font-style: italic;
            font-size: 1rem;
            max-width: 300px;
            text-align: center;
        }

        @media (min-width: 650px) {
            .dirty-job-quote {
                border-left: 2px solid var(--border-color);
                padding-left: 30px;
                text-align: left;
            }
        }

        /* Sub-section & CTA styling */
        .cta-section {
            text-align: center;
            margin-top: 40px;
            padding-top: 40px;
            border-top: 1px dashed var(--border-color);
        }

        .house-wife-quote {
            font-family: var(--font-mono);
            color: var(--accent-color);
            font-size: 1.1rem;
            margin-bottom: 30px;
            letter-spacing: -0.5px;
        }

        .cta-button {
            display: inline-block;
            font-family: var(--font-mono);
            color: var(--bg-color);
            background-color: var(--text-color);
            text-decoration: none;
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: bold;
            border-radius: 4px;
            border: 1px solid var(--text-color);
            transition: all 0.2s ease;
            cursor: pointer;
        }

        .cta-button:hover {
            background-color: var(--bg-color);
            color: var(--hover-color);
            border-color: var(--hover-color);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        /* Footer */
        footer {
            max-width: 800px;
            margin: 120px auto 40px auto;
            text-align: center;
            font-family: var(--font-mono);
            font-size: 0.8rem;
            color: var(--accent-color);
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">Monolith</div>
        <ul class="nav-links">
            <li><a href="https://fidelioa.github.io/monolith">Home</a></li>
            <li><a href="https://fidelioa.github.io/monolith/archives">Archives</a></li>
            <li><a href="https://fidelioa.github.io/monolith/about">About</a></li>
        </ul>
    </nav>

    <main>
        <section class="hero-banner">
            <h1 class="main-title">MONOLITH</h1>
            <p class="dirty-job-quote">"It's a dirty job, but somebody's gotta do it."</p>
        </section>

        <section class="cta-section">
            <p class="house-wife-quote">This is not my beautiful house. This is not my beautiful wife.</p>
            <a href="../" class="cta-button">Let's blow this thing and go home!</a>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 MONOLITH. Built to persist.</p>
    </footer>

</body>
</html>
